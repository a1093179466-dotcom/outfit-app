<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日穿搭</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>今日穿搭</h1>
  </header>

  <div class="container">
    <!-- 左侧：衣柜预览 -->
    <section class="panel wardrobe">
      <h2>我的衣柜</h2>
      <div id="clothList" class="cloth-grid"></div>

      <div class="wardrobe-footer" style="margin-top: 10px;">
        <a class="link-btn" href="./wardrobe.html">进入衣柜详情 →</a>
      </div>
    </section>

    <!-- 中间：控制 -->
    <section class="panel control">
      <h2>生成设置</h2>

      <div class="add-form">
        <label for="seasonSelect"><strong>按季节过滤</strong></label>
        <select id="seasonSelect">
          <option value="spring">春</option>
          <option value="summer">夏</option>
          <option value="autumn" selected>秋</option>
          <option value="winter">冬</option>
        </select>

        <button id="generateBtn" type="button" class="primary-btn">生成今日穿搭</button>

        <div class="empty-tip" id="outfitHint">提示：现在是完全随机（仅按季节过滤），匹配规则后续再做。</div>
      </div>
    </section>

    <!-- 右侧：穿搭结果 -->
    <section class="panel result">
      <h2>今日穿搭结果</h2>

      <div class="detail-grid" style="grid-template-columns: repeat(2, 1fr);">
        <div id="outfitMain1" class="cloth-card">主件1：--</div>
        <div id="outfitMain2" class="cloth-card">主件2：--</div>
        <div id="outfitBottom" class="cloth-card">下装：--</div>
        <div id="outfitSocks" class="cloth-card">袜子：--</div>
        <div id="outfitShoes" class="cloth-card">鞋子：--</div>
      </div>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
